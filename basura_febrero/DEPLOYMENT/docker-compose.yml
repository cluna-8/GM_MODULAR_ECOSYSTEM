version: '3.8'

services:
  gateway:
    build:
      context: ./SERVICES/GM_ADM_MODULAR
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8000:8000"
    networks:
      - gomedisys-net
    restart: always

  gm-general-chat:
    build:
      context: ./SERVICES/GM_GENERAL_CHAT
      dockerfile: Dockerfile
    container_name: gm-general-chat
    ports:
      - "7005:7005"
    env_file:
      - ./SERVICES/GM_GENERAL_CHAT/.env
    environment:
      - REDIS_URL=redis://redis-general:6379/0
      - DEFAULT_PROVIDER=openai
    networks:
      - gomedisys-net
    depends_on:
      - redis-general
    volumes:
      - ./logs/chat:/app/logs
    restart: always

  medical-auditor:
    build:
      context: ./SERVICES/GM_MEDICAL_AUDITOR
      dockerfile: Dockerfile
    container_name: medical-auditor
    ports:
      - "8001:8001"
    env_file:
      - ./SERVICES/GM_GENERAL_CHAT/.env
    environment:
      - REDIS_URL=redis://redis-general:6379/0
    networks:
      - gomedisys-net
    restart: always

  redis-general:
    image: redis/redis-stack-server:latest
    container_name: redis-general
    networks:
      - gomedisys-net
    restart: always

networks:
  gomedisys-net:
    external: true
