version: '3.8'

services:
  api-gateway:
    build: 
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: healthcare-api-gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/healthcare_gateway.db
      - MEDICAL_API_URL=http://healthcare-chat-api:7005
      - JWT_SECRET_KEY=your-super-secret-key-change-in-production
      - ENVIRONMENT=development
    volumes:
      - ./api-gateway:/app
      - gateway_data:/app/data
    networks:
      - back_healthcare-network  # Likely name with directory prefix
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  gateway_data:
    driver: local

networks:
  back_healthcare-network:
    external: true