version: '3.8'

services:
  healthcare-chat-1:
    build: .
    container_name: healthcare-chat-1
    expose:
      - "7005"
    environment:
      - REDIS_URL=redis://redis-chat:6379/0
      - DEFAULT_PROVIDER=openai
    networks:
      - gomedisys-net
    depends_on:
      - redis-chat

  redis-chat:
    image: redis:7-alpine
    container_name: redis-chat
    networks:
      - gomedisys-net

networks:
  gomedisys-net:
    external: true