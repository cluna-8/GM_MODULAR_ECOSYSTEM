version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: healthcare-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  chat-api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: healthcare-chat-api
    ports:
      - "7005:7005"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PORT=7005
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 7005 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - healthcare-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  healthcare-network:
    driver: bridge