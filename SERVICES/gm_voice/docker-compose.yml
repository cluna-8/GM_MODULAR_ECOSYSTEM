version: '3.8'

services:
  redis-voice:
    image: redis:7-alpine
    container_name: redis-voice
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gomedisys-net

  gm-voice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gm-voice
    ports:
      - "7003:7003"
    env_file:
      - .env
    environment:
      - PORT=7003
      - REDIS_URL=redis://redis-voice:6379/0
    depends_on:
      redis-voice:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gomedisys-net

networks:
  gomedisys-net:
    external: true
