version: '3.8'

services:
  gm-voice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gm-voice
    ports:
      - "7003:7003"
    env_file:
      - .env
    environment:
      - PORT=7003
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - back_healthcare-network

networks:
  back_healthcare-network:
    external: true
